<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCoach Development Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            line-height: 1.6;
        }
        
        .header {
            background: #2d2d2d;
            padding: 1rem 2rem;
            border-bottom: 1px solid #444;
        }
        
        .header h1 {
            color: #4CAF50;
            font-size: 1.5rem;
        }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .panel {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid #444;
        }
        
        .panel h2 {
            color: #4CAF50;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        
        .service-grid {
            display: grid;
            gap: 1rem;
        }
        
        .service-card {
            background: #3d3d3d;
            border-radius: 6px;
            padding: 1rem;
            border-left: 4px solid #4CAF50;
        }
        
        .service-card.stopped {
            border-left-color: #f44336;
        }
        
        .service-card.starting {
            border-left-color: #ff9800;
        }
        
        .service-name {
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }
        
        .service-status {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .service-status.running {
            background: #4CAF50;
            color: white;
        }
        
        .service-status.exited {
            background: #f44336;
            color: white;
        }
        
        .service-status.created {
            background: #ff9800;
            color: white;
        }
        
        .service-actions {
            margin-top: 0.5rem;
        }
        
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .btn.danger {
            background: #f44336;
        }
        
        .btn.danger:hover {
            background: #da190b;
        }
        
        .btn.warning {
            background: #ff9800;
        }
        
        .btn.warning:hover {
            background: #e68900;
        }
        
        .metrics-grid {
            display: grid;
            gap: 1rem;
        }
        
        .metric-card {
            background: #3d3d3d;
            border-radius: 6px;
            padding: 1rem;
        }
        
        .metric-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .metric-label {
            color: #ccc;
            font-size: 0.9rem;
        }
        
        .logs-container {
            background: #1a1a1a;
            border-radius: 6px;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            border: 1px solid #444;
        }
        
        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.2rem;
            border-radius: 3px;
        }
        
        .log-entry.error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
        }
        
        .log-entry.warning {
            background: rgba(255, 152, 0, 0.1);
            color: #ff9800;
        }
        
        .log-entry.info {
            color: #4CAF50;
        }
        
        .file-changes {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .file-change {
            padding: 0.5rem;
            border-bottom: 1px solid #444;
            font-size: 0.9rem;
        }
        
        .file-change.change {
            border-left: 3px solid #2196F3;
        }
        
        .file-change.add {
            border-left: 3px solid #4CAF50;
        }
        
        .file-path {
            color: #4CAF50;
            font-family: monospace;
        }
        
        .timestamp {
            color: #888;
            font-size: 0.8rem;
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }
        
        .status-indicator.online {
            background: #4CAF50;
        }
        
        .status-indicator.offline {
            background: #f44336;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 MindCoach Development Dashboard</h1>
        <div>
            <span class="status-indicator online" id="connection-status"></span>
            <span id="connection-text">Connected</span>
            <span class="timestamp" id="last-update"></span>
        </div>
    </div>
    
    <div class="container">
        <div class="panel">
            <h2>🐳 Services</h2>
            <div class="service-grid" id="services-container">
                <div class="service-card">
                    <div class="service-name">Loading services...</div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h2>📊 Metrics</h2>
            <div class="metrics-grid" id="metrics-container">
                <div class="metric-card">
                    <div class="metric-value">Loading...</div>
                    <div class="metric-label">System Status</div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h2>📝 Recent File Changes</h2>
            <div class="file-changes" id="file-changes-container">
                <div class="file-change">
                    <div>Monitoring file changes...</div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h2>📋 Application Logs</h2>
            <div>
                <select id="log-service-select" style="margin-bottom: 1rem; padding: 0.5rem; background: #3d3d3d; color: white; border: 1px solid #666; border-radius: 4px;">
                    <option value="">Select service...</option>
                </select>
                <button class="btn" onclick="loadLogs()">Load Logs</button>
            </div>
            <div class="logs-container" id="logs-container">
                <div class="log-entry">Select a service to view logs...</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let services = {};
        let metrics = {};
        let fileChanges = [];
        
        // Connection status
        socket.on('connect', () => {
            document.getElementById('connection-status').className = 'status-indicator online';
            document.getElementById('connection-text').textContent = 'Connected';
        });
        
        socket.on('disconnect', () => {
            document.getElementById('connection-status').className = 'status-indicator offline';
            document.getElementById('connection-text').textContent = 'Disconnected';
        });
        
        // Services update
        socket.on('services-update', (data) => {
            services = data;
            updateServicesDisplay();
            updateServiceSelect();
            updateLastUpdate();
        });
        
        // Metrics update
        socket.on('metrics-update', (data) => {
            metrics = data;
            updateMetricsDisplay();
        });
        
        // File changes
        socket.on('file-change', (change) => {
            fileChanges.unshift(change);
            if (fileChanges.length > 50) {
                fileChanges = fileChanges.slice(0, 50);
            }
            updateFileChangesDisplay();
        });
        
        function updateServicesDisplay() {
            const container = document.getElementById('services-container');
            container.innerHTML = '';
            
            Object.entries(services).forEach(([name, service]) => {
                const card = document.createElement('div');
                card.className = `service-card ${service.status}`;
                
                card.innerHTML = `
                    <div class="service-name">${name}</div>
                    <div class="service-status ${service.status}">${service.status}</div>
                    <div style="font-size: 0.8rem; color: #ccc; margin: 0.5rem 0;">
                        ID: ${service.id}<br>
                        Image: ${service.image}
                    </div>
                    <div class="service-actions">
                        <button class="btn" onclick="restartService('${name}')">Restart</button>
                        <button class="btn warning" onclick="stopService('${name}')">Stop</button>
                        <button class="btn" onclick="startService('${name}')">Start</button>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        function updateMetricsDisplay() {
            const container = document.getElementById('metrics-container');
            container.innerHTML = '';
            
            Object.entries(metrics).forEach(([name, metric]) => {
                if (name === 'application') {
                    const card = document.createElement('div');
                    card.className = 'metric-card';
                    card.innerHTML = `
                        <div class="metric-value">${metric.health.status}</div>
                        <div class="metric-label">Application Health</div>
                    `;
                    container.appendChild(card);
                } else if (metric.cpu !== undefined) {
                    const card = document.createElement('div');
                    card.className = 'metric-card';
                    card.innerHTML = `
                        <div class="metric-value">${metric.cpu.toFixed(1)}%</div>
                        <div class="metric-label">${name} CPU</div>
                    `;
                    container.appendChild(card);
                    
                    const memCard = document.createElement('div');
                    memCard.className = 'metric-card';
                    memCard.innerHTML = `
                        <div class="metric-value">${metric.memory.toFixed(1)}%</div>
                        <div class="metric-label">${name} Memory</div>
                    `;
                    container.appendChild(memCard);
                }
            });
        }
        
        function updateFileChangesDisplay() {
            const container = document.getElementById('file-changes-container');
            container.innerHTML = '';
            
            fileChanges.slice(0, 20).forEach(change => {
                const div = document.createElement('div');
                div.className = `file-change ${change.type}`;
                div.innerHTML = `
                    <div class="file-path">${change.path}</div>
                    <div class="timestamp">${new Date(change.timestamp).toLocaleTimeString()} - ${change.type}</div>
                `;
                container.appendChild(div);
            });
        }
        
        function updateServiceSelect() {
            const select = document.getElementById('log-service-select');
            select.innerHTML = '<option value="">Select service...</option>';
            
            Object.keys(services).forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });
        }
        
        function updateLastUpdate() {
            document.getElementById('last-update').textContent = 
                'Last update: ' + new Date().toLocaleTimeString();
        }
        
        async function restartService(serviceName) {
            try {
                const response = await fetch(`/api/services/${serviceName}/restart`, {
                    method: 'POST'
                });
                const result = await response.json();
                alert(result.message || result.error);
            } catch (error) {
                alert('Error restarting service: ' + error.message);
            }
        }
        
        async function stopService(serviceName) {
            try {
                const response = await fetch(`/api/services/${serviceName}/stop`, {
                    method: 'POST'
                });
                const result = await response.json();
                alert(result.message || result.error);
            } catch (error) {
                alert('Error stopping service: ' + error.message);
            }
        }
        
        async function startService(serviceName) {
            try {
                const response = await fetch(`/api/services/${serviceName}/start`, {
                    method: 'POST'
                });
                const result = await response.json();
                alert(result.message || result.error);
            } catch (error) {
                alert('Error starting service: ' + error.message);
            }
        }
        
        async function loadLogs() {
            const serviceName = document.getElementById('log-service-select').value;
            if (!serviceName) {
                alert('Please select a service');
                return;
            }
            
            try {
                const response = await fetch(`/api/logs/${serviceName}`);
                const result = await response.json();
                
                const container = document.getElementById('logs-container');
                container.innerHTML = '';
                
                if (result.logs) {
                    const lines = result.logs.split('\n').filter(line => line.trim());
                    lines.forEach(line => {
                        const div = document.createElement('div');
                        div.className = 'log-entry';
                        
                        if (line.toLowerCase().includes('error')) {
                            div.className += ' error';
                        } else if (line.toLowerCase().includes('warning')) {
                            div.className += ' warning';
                        } else {
                            div.className += ' info';
                        }
                        
                        div.textContent = line;
                        container.appendChild(div);
                    });
                    
                    container.scrollTop = container.scrollHeight;
                } else {
                    container.innerHTML = '<div class="log-entry">No logs available</div>';
                }
            } catch (error) {
                alert('Error loading logs: ' + error.message);
            }
        }
        
        // Load initial data
        fetch('/api/dashboard')
            .then(response => response.json())
            .then(data => {
                services = data.services || {};
                metrics = data.metrics || {};
                fileChanges = data.fileChanges || [];
                
                updateServicesDisplay();
                updateMetricsDisplay();
                updateFileChangesDisplay();
                updateServiceSelect();
                updateLastUpdate();
            })
            .catch(error => {
                console.error('Error loading dashboard data:', error);
            });
    </script>
</body>
</html>
