global
    daemon
    log stdout local0 info
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy

    # SSL/TLS configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option log-health-checks
    option forwardfor
    option http-server-close
    timeout connect 5000
    timeout client 50000
    timeout server 50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# Statistics page
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    stats show-legends
    stats show-node

# Frontend for HTTP traffic
frontend http_frontend
    bind *:80
    
    # Redirect HTTP to HTTPS
    redirect scheme https code 301 if !{ ssl_fc }

# Frontend for HTTPS traffic
frontend https_frontend
    bind *:443 ssl crt /etc/ssl/certs/mindcoach.pem
    
    # Security headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Frame-Options "DENY"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    
    # Rate limiting
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request reject if { sc_http_req_rate(0) gt 20 }
    
    # Route API requests to backend
    acl is_api path_beg /api
    acl is_health path /api/health
    acl is_websocket hdr(Upgrade) -i websocket
    
    # Use backend servers for API requests
    use_backend api_backend if is_api
    use_backend websocket_backend if is_websocket
    
    # Use nginx servers for static content
    default_backend static_backend

# Backend for API servers
backend api_backend
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200
    
    # Connection pooling and keep-alive
    option http-keep-alive
    timeout server 30s
    timeout connect 5s
    
    # Backend servers (auto-discovered)
    server-template backend- 1-10 backend:5000 check inter 10s fall 3 rise 2 maxconn 100
    
    # Sticky sessions for stateful operations
    cookie SERVERID insert indirect nocache
    
    # Health check configuration
    option log-health-checks
    
    # Compression
    compression algo gzip
    compression type text/html text/plain text/css text/javascript application/javascript application/json

# Backend for WebSocket connections
backend websocket_backend
    balance source
    option httpchk GET /api/health
    http-check expect status 200
    
    # WebSocket specific settings
    timeout tunnel 3600s
    timeout server 3600s
    
    server-template ws-backend- 1-5 backend:5000 check inter 30s fall 3 rise 2

# Backend for static content
backend static_backend
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    
    # Cache control for static assets
    http-response set-header Cache-Control "public, max-age=31536000" if { path_end .js .css .png .jpg .jpeg .gif .ico .woff .woff2 }
    http-response set-header Cache-Control "public, max-age=3600" if { path_end .html }
    
    server-template nginx- 1-5 nginx:80 check inter 10s fall 3 rise 2

# Backend for monitoring
backend monitoring_backend
    balance roundrobin
    server prometheus prometheus:9090 check inter 30s
    server grafana grafana:3000 check inter 30s

# Listen for monitoring endpoints
listen monitoring
    bind *:9090
    mode http
    option httplog
    
    # Route to appropriate monitoring service
    acl is_grafana path_beg /grafana
    use_backend monitoring_backend if is_grafana
    default_backend monitoring_backend

# Error handling
errorfile 503 /etc/haproxy/errors/503-custom.http